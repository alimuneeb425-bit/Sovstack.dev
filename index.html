<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovstack.dev - Matrix Compiler Platform</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #f4f4f4;
            --text-color: #333333;
            --accent-color: #0066cc;
            --success-color: #28a745;
            --border-color: #cccccc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 800px; }
        header { border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .option-card { background-color: var(--card-bg); border: 2px solid var(--border-color); border-radius: 6px; padding: 15px; cursor: pointer; }
        .option-card.active { border-color: var(--accent-color); }

        .workspace-panel { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; }
        
        button { background-color: var(--success-color); color: white; border: none; border-radius: 4px; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .terminal-log { background-color: #000; color: #39ff14; padding: 15px; font-family: monospace; border-radius: 4px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sovstack.dev Matrix Platform</h1>
    </header>

    <div class="options-grid">
        <div class="option-card active" id="card-android" onclick="switchTarget('android')"><h3>Android Native App</h3></div>
        <div class="option-card" id="card-chatbot" onclick="switchTarget('chatbot')"><h3>Chatbot App</h3></div>
        <div class="option-card" id="card-onprem" onclick="switchTarget('onprem')"><h3>On-Premises Chatbot</h3></div>
    </div>

    <div class="workspace-panel">
        <div class="form-group">
            <label>Application Name</label>
            <input type="text" id="appNameInput" value="MatrixGuardCore">
        </div>
        <div class="form-group">
            <label>AI Synthesis Prompt</label>
            <textarea id="promptInput" rows="4" placeholder="Describe your app logic here..."></textarea>
        </div>
        <div class="form-group">
            <label>Theme Color</label>
            <input type="color" id="themeColorInput" value="#ffffff">
        </div>
    </div>

    <button id="buildButton" onclick="triggerAndroidBuild()">Deploy Build Sequence</button>
    <br><br>
    <div class="terminal-log" id="statusOutput">Terminal Ready.</div>
</div>

<script>
    let currentCompilationTarget = 'android';

    function switchTarget(type) {
        currentCompilationTarget = type;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${type}`).classList.add('active');
    }

    async function triggerAndroidBuild() {
        const buildButton = document.getElementById('buildButton');
        const status = document.getElementById('statusOutput');
        
        buildButton.disabled = true;
        status.innerText = "Initializing 10-Agent network...";

        try {
            const response = await fetch("https://alimuneeb425-sovstack-brain.hf.space/api/build/android", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    app_name: document.getElementById('appNameInput').value,
                    prompt: document.getElementById('promptInput').value,
                    theme_color: document.getElementById('themeColorInput').value,
                    features: [currentCompilationTarget]
                })
            });

            if (!response.ok) throw new Error("Compilation Failed");

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "output_package.apk";
            a.click();
            status.innerText = "Success! Binary downloaded.";
        } catch (e) {
            status.innerText = "Error: " + e.message;
        } finally {
            buildButton.disabled = false;
        }
    }
</script>
</body>
</html>
