<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Gateway Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #10b981;
            --border: #1f2937;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s ease;
        }

        .google-btn {
            background-color: #ffffff;
            color: #1f2937;
        }

        .google-btn:hover {
            background-color: #f9fafb;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
        }

        .logout-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            margin-top: 16px;
        }

        .logout-btn:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }

        .user-email {
            font-family: monospace;
            background: #1f2937;
            padding: 8px;
            border-radius: 4px;
            word-break: break-all;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="auth-card" class="card">
            <h2>System Authentication</h2>
            <p>Sign in using your Google account to access your node environments.</p>
            
            <button id="google-login-btn" class="btn google-btn">
                <img src="https://www.google.com/favicon.ico" alt="Google icon" class="btn-icon">
                Sign in with Google
            </button>
        </div>

        <div id="dashboard-card" class="card hidden">
            <h2>Access Granted</h2>
            <p id="user-display" class="user-email"></p>
            <button id="signout-btn" class="btn logout-btn">Disconnect Session</button>
        </div>

    </div>

    <script>
        // Core Supabase Dashboard Project URLs
        const SUPABASE_URL = 'https://rfluomremdbdxssvhidr.supabase.co';
        
        // Configured with your project public anon token
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmbHVvbXJlbWRidHhzc3ZoaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4MTM5MzIsImV4cCI6MjAzMjM4OTkzMn0.U-L-tS45g1G08y8N_MvN53u5H9O5H9O5H9O5H9O5H9O';

        // Initialize the client connection directly from the loaded CDN global scope
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // UI Cache elements
        const authCard = document.getElementById('auth-card');
        const dashboardCard = document.getElementById('dashboard-card');
        const userDisplay = document.getElementById('user-display');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const signoutBtn = document.getElementById('signout-btn');

        // Monitor interactive actions once elements are mounted
        document.addEventListener('DOMContentLoaded', () => {
            if (googleLoginBtn) {
                googleLoginBtn.addEventListener('click', handleGoogleSignIn);
            }
            if (signoutBtn) {
                signoutBtn.addEventListener('click', handleSignOut);
            }
        });

        // Trigger Google OAuth window
        async function handleGoogleSignIn() {
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        // Vercel handles pointing window.location.origin to your current active domain automatically
                        redirectTo: window.location.origin,
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'select_account'
                        }
                    }
                });

                if (error) throw error;
            } catch (err) {
                console.error('Sign-in initialization failed:', err.message);
                alert(`Authentication Error: ${err.message}`);
            }
        }

        // Sign out implementation
        async function handleSignOut() {
            try {
                const { error } = await supabaseClient.auth.signOut();
                if (error) throw error;
            } catch (err) {
                console.error('Sign-out failed:', err.message);
            }
        }

        // Automatic authentication state engine tracking
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                // Switch window frames to dashboard
                if (authCard) authCard.classList.add('hidden');
                if (dashboardCard) dashboardCard.classList.remove('hidden');
                
                // Show identity string
                if (userDisplay) {
                    userDisplay.innerText = session.user.email;
                }
            }

            if (event === 'SIGNED_OUT') {
                // Revert dashboard back to login gate layout
                if (dashboardCard) dashboardCard.classList.add('hidden');
                if (authCard) authCard.classList.remove('hidden');
                if (userDisplay) userDisplay.innerText = '';
            }
        });
    </script>
</body>
</html>
